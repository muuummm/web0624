<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 簡易的reset */
        /* 米字代表全部的html標籤 */
        *{
            margin: 0;
            padding: 0;
        }
        
        .banner{
            /* 滿版設定 */
            /* vh= visual height= 可見高度= 視窗當前高度 */
            width: 100%;
            height: 80vh;
            /* 多重背景；漸層背景+背景圖 */
            /* linear-gradient：漸層 */
            /* transparent：透明 */
            /* "./" →相對位置 */
            background: linear-gradient( 115deg, rgb(192, 192, 248) 50%, transparent 50%),
            url(./images/04.jpg ) right center/ auto 100%; 

            }
        
        /* 頁面內容顯示區 */
        .container{
            width: 1200px;               /* 用px設定，縮放寬度不足時margin會自動被壓縮為零(設定寬度優先、文字會被裁切)；
                                         用%設定時，無論縮放寬度都仍維持與邊界空間(文字會自動換行) */
            margin: auto;                /* 均分邊界 */
            height: 100%;

        }

        /* 文字區 */
        .banner-txt{
            height: 100%;
            display: flex;              /* flex：預設為水平排列 */
            flex-direction: column;     /* 方向改回垂直 */
            justify-content: center;    /* 垂直置中 */
            align-items: flex-start;    /* 靠左對齊(取消自動延展) */
        }


        h1{
            font-size: 80px;
            border-bottom: 1px solid gray;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        h1 small{
            display: block;
            font-size: 40px;
        }

        .banner-txt h2{
            font-size: 40px;
            margin-bottom: 10px;        /* 下邊界加大 */
        }

        .banner-txt p{
            font-size: 20px;
            line-height: 1.5;           /* 行距 */
        }

        </style>
</head>
<body>
    <div class="banner">
        <div class="container">
            <div class="banner-txt">
                <h1>主標題
                    <small>
                        Lorem ipsum dolor sit amet.
                    </small>
                </h1>
                <h2>副標題</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit, suscipit.</p>
                <p>Lorem ipsum dolor sit amet consectetur.</p>
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>
    </div>
</body>
</html>
