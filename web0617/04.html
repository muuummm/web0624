<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04交錯圖文</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrap{
            width: 1200px;
            margin: 100px auto;
            align-items: center;
            /* background: linear-gradient(blue, violet); */
        }

        .item{
            /* border: 1px solid red; */
            margin-bottom: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* flex-direction: column; */

        }

        .item .pic img{
            width: 100%;
            height: 400px;
            object-fit: cover;
            
        }

        .item .pic{
            width: 55%;                 /* A */
            /* 強制設定物件 */
            flex-shrink: 0;
        }

        .item >:first-child{
            margin-right: -10%;         /* B ,與A共同影響交錯範圍*/
        }

        .item .txt{
            background-color: aqua  ;
            /* 調整圖層順序(數字越大越上方) */
            z-index: 10;
            padding: 50px 30px;
        }

        /* 第一個文字區顏色 */
        .item:nth-child(1) .txt{          /* 冒號前不加空格(影響判定) */
            background-color: rgba(127, 255, 212, .8);
        }

        /* 第二個文字區顏色 */
        .item:nth-child(2) .txt{
            background-color: rgba(127, 193, 255, 0.8);
        }
    </style>

</head>
<body>
    <div class="wrap">
        <!-- 第一組 -->
         <div class="item">
            <!-- 圖片層 -->
             <div class="pic">
                <img src="./images/05.jpg" alt="">
             </div>
             <!-- 文字層 -->
              <div class="txt">
                <h2>Lorem ipsum dolor sit amet.</h2>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Soluta, eos.</p>
              </div>
              
         </div>

         <!-- 第二組 -->
         <div class="item">
                        <!-- 文字層 -->
              <div class="txt">
                <h2>Lorem ipsum dolor sit amet.</h2>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Soluta, eos.</p>
              </div>
               <!-- 圖片層 -->
             <div class="pic">
                <img src="./images/06.jpg" alt="">
             </div>
         </div>

    </div>
</body>
</html>
